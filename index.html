<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <style>
        body {
            font-family:Arial;
            text-align:center;
            padding:50px;
            transition:0.3s;
        }
        
        .light {
            background-color:white;
            color:black;
        }
        
        .dark {
            background-color:#222;
            color:white;
        }
        
        .container {
            border:2px solid #ccc;
            padding:20px;
            border-radius:10px;
            display:inline-block;
        }
        
        input {
            padding:8px;
            width:200px;
        }
        
        button {
            padding:8px 15px;
            margin:5px;
            cursor:pointer;
        }
        
        #result-box {
            margin-top:20px;
            padding:15px;
            background-color:#87CEEB;
            color:black;
            border-radius:5px;
        }
        
        #history-box {
            margin-top:20px;
            text-align:left;
        }
    </style>
</head>
<body class="light" id="pageBody">

    <div class="container">
        <h2>Weather App</h2>
        
        <button onclick="changeTheme('light')">Light Mode</button>
        <button onclick="changeTheme('dark')">Dark Mode</button>
        <br><br>
        
        <input type="text" id="cityInput" placeholder="Enter city name...">
        <button onclick="getWeather()">Search</button>

        <div id="result-box">
            Weather will show here...
        </div>

        <div id="history-box">
            <h3>Search History:</h3>
            <ul id="historyList"></ul>
            <button onclick="clearHistory()">Clear</button>
        </div>
    </div>

    <script>
        var currentTheme=localStorage.getItem("themeColor");
        
        if (currentTheme) {
            document.getElementById("pageBody").className=currentTheme;
        }

        function changeTheme(color) {
            document.getElementById("pageBody").className=color;
            localStorage.setItem("themeColor",color);
        }

        function getWeather() {
            var city=document.getElementById("cityInput").value;
            
            if (city=="") {
                alert("Please enter a city!");
                return;
            }

            saveToHistory(city);

            var apiKey="3ebac56ed327bcabde7e56f98ed62493"; 
            var url="https://api.openweathermap.org/data/2.5/weather?q="+city+"&appid="+apiKey+"&units=metric";
            
            var box = document.getElementById("result-box");
            box.innerHTML="Loading...";

            fetch(url)
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    if (data.name) {
                        box.innerHTML="City: " + data.name + "<br> Temperature: " + data.main.temp + " °C";
                    } else {
                        box.innerHTML="City not found!";
                    }
                })
                .catch(function(error) {
                    box.innerHTML="Error connecting to the internet!";
                });
        }

        function saveToHistory(city) {
            var oldHistory=localStorage.getItem("myHistory");
            
            if (oldHistory==null) {
                localStorage.setItem("myHistory",city);
            } else {
                localStorage.setItem("myHistory",oldHistory+","+city);
            }
            
            showHistory();
        }

        function showHistory() {
            var list=document.getElementById("historyList");
            var data=localStorage.getItem("myHistory");
            
            list.innerHTML=""; 
            
            if (data!=null) {
                var cities=data.split(",");
                
                for (var i = 0; i < cities.length; i++) {
                    list.innerHTML+="<li>"+cities[i]+"</li>";
                }
            }
        }

        function clearHistory() {
            localStorage.removeItem("myHistory");
            showHistory();
        }

        showHistory();
    </script>
</body>
</html>
